services:
  torrent:
    image: ghcr.io/linuxserver/qbittorrent:5.0.2
    network_mode: service:vpn
    # maybe restart if unhealthy vpn? https://stackoverflow.com/a/66485341/2423187
    # It would be better to change the healthcheck to notice it can't be accessed once the vpn restarts
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8081
    volumes:
      - ./qbittorrent:/config
      - ~/Downloads:/downloads
      - /mnt/scihub:/scihub
    healthcheck:
      test: ["CMD", "wget", "-q", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8081"]
      interval: 60s
      retries: 3
      start_period: 0s
      timeout: 30s
    restart: always
  #============================================================================================================
  vpn:
    image: qmcgaw/gluetun
    cap_add:
      - NET_ADMIN
    ports:
      - 8081:8081
      - 5031:5031
      - 5030:5030
    volumes:
      - ./vpn-scripts:/vpn-scripts
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY_SECRETFILE=/run/secrets/protonkey
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c   '/vpn-scripts/port-forward {{PORT}} {{VPN_INTERFACE}} https://vpn:8081 2>&1'
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c '/vpn-scripts/port-forward 0 lo https://vpn:8081 2>&1'
    secrets:
      - protonkey
    restart: always
  ip_bullshit:
    network_mode: service:vpn
    build:
      context: ip-detection
    volumes:
      - ./vpn-scripts/cron:/scripts
      - ./vpn-scripts/cron/cache:/cache
    restart: always
    depends_on:
      vpn:
        condition: service_healthy
  slskd:
    image: slskd/slskd
    network_mode: service:vpn
    user: 1000:1000
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ./soulseek:/app
      - ~/Downloads:/downloads
      - /mnt/media/music/music:/music:ro
    restart: always
secrets:
  protonkey:
    file: ./wireguardkey_proton
